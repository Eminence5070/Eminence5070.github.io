<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertex</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #060a0f;
      color: #fff;
      z-index: -10;
    }

    nav span {
      color: #fff;
      padding: 10px;
      text-align: left;
      font-size: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    nav {
      background-color: #000103;
      overflow: hidden;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      border-top: 2px solid;
      border-bottom: 2px solid;
      border-image: linear-gradient(to right, #4287f5, #01061a);
      border-image-slice: 1;
    }

    nav a {
      color: #fff;
      text-align: center;
      padding: 10px;
      text-decoration: none;
      font-size: 16px;
    }

    nav a i {
      margin-right: 5px;
    }

    nav a:hover {
      background-color: #555;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown .dropbtn {
      font-size: 16px;
      border: none;
      outline: none;
      color: #fff;
      padding: 10px;
      background-color: inherit;
      font-family: inherit;
      margin: 0;
    }

    .dropdown-content {
      display: none;
      position: fixed;
      margin-left: 20px;
      min-width: 64px;
      z-index: 10000;
      text-align: left;
      background-color: black;
      color: white;
      border-radius: 8px;
      opacity: 0.85;
      border: 1px rgba(255, 255, 255, 0.1) solid;
    }

    .landing-page button {
      transition: transform 0.5s, opacity 0.5s;
      color: #ffffff;
      border: none;
      font-size: 18px;
      border-radius: 4px;
      cursor: pointer;
      background-color: #4287f5;
      padding: 10px 20px;
      margin-top: 20px;
      margin-right: 10px;
      margin-bottom: 20px;
      text-align: center;
      width: 210px;
      height: 54px;
    }

    .landing-page button:hover {
      opacity: 0.775;
    }

    *::placeholder {
      color: lightgray;
    }

    textarea {
      background-color: #000103;
      color: #fff;
      border: 2px solid #fff;
      border-radius: 8px;
      padding: 8px;
      font-size: 16px;
      margin-bottom: 16px;
      width: 80vw;
      height: 30vh;
      transition: border-color 0.3s ease-in-out, scale 0.3s ease-in-out;
      outline: none;
    }

    textarea:focus {
      border-color: #4287f5;
      scale: 1.015;
    }

    .dropdown-content:hover {
      opacity: 1;
      transition-delay: 0.015s;
    }

    .dropdown-content a {
      color: white;
      padding: 10px;
      text-decoration: none;
      display: block;
      font-size: 14px;
    }

    .dropdown-content a:hover {
      background-color: rgba(255, 255, 255, 0.01);
      color: white;
      border-left: white 2px solid;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .landing-page {
      text-align: center;
      margin-top: 50px;
    }

    .landing-page h1 {
      font-size: 36px;
    }
  </style>
</head>

<body>
  <nav>
    <span>Vertex</span>
    <div>
      <div class="dropdown">
        <button class="dropbtn"><i class="fas fa-gamepad"></i> Games &#9662;</button>
        <div class="dropdown-content">
          <a href="cloakify.html">Bloons TD 2</a>
          <a href="cloakify.html">Bloons TD 3</a>
          <a href="cloakify.html">Minecraft 1.5.2</a>
          <a href="cloakify.html">Minecraft 1.8.8</a>
        </div>
      </div>
      <div class="dropdown">
        <button class="dropbtn"><i class="fas fa-th"></i> Apps &#9662;</button>
        <div class="dropdown-content">
          <a href="/apps/cloakify.html">Cloakify</a>
          <a href="#">Sandbox</a>
          <a href="#">Flash Emulator</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="landing-page">
    <h1 style="transform:scale(1.025);">Sandbox</h1>
    <p style="transform:scale(1.2);">Run your own HTML & JavaScript snippets in the web!</p>
    <textarea id="i" type="text" placeholder="Enter HTML code..."></textarea><br><textarea id="i1" type="text"
      placeholder="Enter CSS styles..."></textarea><br><textarea id="i2" type="text"
      placeholder='Enter JavaScript code...'></textarea><br>
    <button id="c"><svg xmlns="http://www.w3.org/2000/svg" height="16" width="16" viewBox="0 0 512 512">
        <path fill="#ffffff"
          d="M320 0c-17.7 0-32 14.3-32 32s14.3 32 32 32h82.7L201.4 265.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L448 109.3V192c0 17.7 14.3 32 32 32s32-14.3 32-32V32c0-17.7-14.3-32-32-32H320zM80 32C35.8 32 0 67.8 0 112V432c0 44.2 35.8 80 80 80H400c44.2 0 80-35.8 80-80V320c0-17.7-14.3-32-32-32s-32 14.3-32 32V432c0 8.8-7.2 16-16 16H80c-8.8 0-16-7.2-16-16V112c0-8.8 7.2-16 16-16H192c17.7 0 32-14.3 32-32s-14.3-32-32-32H80z" />
      </svg> Execute</button>
    <button id="d"><i class="fas fa-code"></i> Embed</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js"></script>
  <script>
    const c = document.getElementById("c");
    const d = document.getElementById("d");
    c.addEventListener("click", () => {
      const i = document.getElementById("i");
      const u = i.value;
      const i1 = document.getElementById("i1");
      const u1 = i1.value;
      const i2 = document.getElementById("i2");
      const u2 = i2.value;
      const w = window.open("", "_blank");
      w.document.write(`<head><style>${u1}</style></head><body>${u}<script>${u2}<\/script></body>`);
    });
    d.addEventListener("click", () => {
      const i = document.getElementById("i");
      const u = i.value;
      const i1 = document.getElementById("i1");
      const u1 = i1.value;
      const i2 = document.getElementById("i2");
      const u2 = i2.value;
      document.body.innerHTML = `${u}<script>${u2}
      <\/script>`
      document.head.innerHTML = `<style>${u1}</style>`
    });

  </script>

</body>

</html>
