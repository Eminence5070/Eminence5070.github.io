<head>

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #060a0f;
    }

    .text-warp {
      perspective: 106px;
      transform: rotateX(25deg) rotateY(20deg);
      transform-style: preserve-3d;
      animation: anim 40s infinite alternate;
      -webkit-backdrop-filter: blur(8.9px);
      backdrop-filter: blur(20px);
      color: rgba(255, 255, 255, 0.975);
      font-family: Arial;
      display: grid;
      justify-content: center;
      align-items: center;
      justify-items: center;
      margin-top: 144px;
      align-self: center;
    }

    .bg {
      background-color: rgba(4, 19, 28, 0.5);
      padding: 18px;
      border: 3px solid rgba(255, 255, 255, 0.017);
      border-radius: 8px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(8.9px);
    }

    .text-warp span {
      display: inline-block;
      font-size: 32px;
      transform: translateZ(0);
      white-space: nowrap;
    }

    @keyframes anim {
      0% {
        perspective: 106px;
        transform: rotateX(20deg) rotateY(20deg);
      }

      100% {
        perspective: 0px;
        transform: rotateX(-50deg) rotateY(-10deg);
      }
    }

    .back {
      width: 15vw;
      height: 6vw;
      background-color: transparent;
      border: 2px solid white;
      color: white;
      font-size: 2vw;
      border-radius: 2px;
      margin-top: 16px;
      transition: all .25s ease-in-out;
    }

    .back:hover {
      background-color: white;
      color: black;
      cursor: pointer;
    }
  </style>
  <style>

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown .dropbtn {
      font-size: 16px;
      border: none;
      outline: none;
      color: #fff;
      padding: 10px;
      background-color: inherit;
      font-family: inherit;
      margin: 0;
    }

    .dropdown-content {
      display: none;
      position: fixed;
      margin-left: 20px;
      right: 10px;
      min-width: 172px;
      z-index: 10000;
      text-align: left;
      background-color: black;
      color: white;
      border-radius: 8px;
      opacity: 0.85;
      border: 1px rgba(255, 255, 255, 0.1) solid;
      backdrop-filter: blur(100px);
      transition-duration: 5s;
    }

    .dropdown-content:hover {
      opacity: 1;
      transition-duration: 1s;
    }

    .dropdown-content:hover:after {
      opacity: 0;
      transition-duration: 1s;
    }

    .dropdown-content a {
      color: white;
      padding: 10px;
      text-decoration: none;
      display: block;
      font-size: 14px;
    }

    .dropdown-content a:hover {
      background-color: rgba(255, 255, 255, 0.01);
      color: white;
      border-left: white 2px solid;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .landing-page {
      text-align: center;
      margin-top: 50px;
    }

    .landing-page h1 {
      font-size: 40px;
    }

    .team {

      color: white;
      margin: 2px;
      font-size: 1.5vw;
      border-radius: 2px;
      transition-duration: 0.1s;
      transition: all 0.25s ease-in-out;
    }

    .team:hover {

      cursor: pointer;
    }

    .about {
      width: 13.5vw;

      color: white;
      font-size: 1.5vw;

      margin: 2px;
      transition: all .25s ease-in-out;
    }

    .about:hover {
      background-color: white;
      color: black;
      cursor: pointer;
    }
  </style>
