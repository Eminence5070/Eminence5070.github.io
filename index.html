<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>data stuff</title>
</head>
<body>
    <input id="mean"><button id="mean-btn">Calculate mean</button>
    <p>Website made by: Cedar Quattlebaum</p>
    <p>For financial math class!</p>
    <p>View formulas <a href="index.js">here!</a></p>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let button = document.getElementById("mean-btn"); // the btn isnt mean, it calculates mean silly
            button.addEventListener("click", function() {
                let input = document.getElementById('mean');
                let data = input.value;
                let mean = mean(data);

                input.value = mean;
            });
        });
    </script>
    <script src="/index.js" defer></script>
</body>
</html>
