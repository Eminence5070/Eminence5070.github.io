<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertex</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #060a0f;
      color: #fff;
      z-index: -10;
      font-size: 18px;
      overflow: hidden;
    }

    nav span {
      color: #fff;
      padding: 10px;
      text-align: left;
      font-size: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    nav {
      background-color: rgba(0, 1, 3, 0.75);
      overflow: hidden;
      height: 11vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      border-top: 2px solid;
      border-bottom: 2px solid;
      border-image: linear-gradient(to right, rgba(66, 135, 245, 0.75), rgba(1, 6, 26, 0.75));
      border-image-slice: 1;
    }

    nav a {
      color: #fff;
      text-align: center;
      padding: 10px;
      text-decoration: none;
      font-size: 16px;
    }

    nav a i {
      margin-right: 5px;
    }

    nav a:hover {
      background-color: #555;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown .dropbtn {
      font-size: 16px;
      border: none;
      outline: none;
      color: #fff;
      padding: 10px;
      background-color: inherit;
      font-family: inherit;
      margin: 0;
    }

    .dropdown-content {
      display: none;
      position: fixed;
      margin-left: 20px;
      right: 10px;
      min-width: 172px;
      z-index: 10000;
      text-align: left;
      background-color: black;
      color: white;
      border-radius: 8px;
      opacity: 0.85;
      border: 1px rgba(255, 255, 255, 0.1) solid;
      backdrop-filter: blur(100px);
      transition-duration: 5s;
    }

    .dropdown-content:hover {
      opacity: 1;
      transition-duration: 1s;
    }

    .dropdown-content:hover:after {
      opacity: 0;
      transition-duration: 1s;
    }

    .dropdown-content a {
      color: white;
      padding: 10px;
      text-decoration: none;
      display: block;
      font-size: 14px;
    }

    .dropdown-content a:hover {
      background-color: rgba(255, 255, 255, 0.01);
      color: white;
      border-left: white 2px solid;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .landing-page {
      text-align: center;
      margin-top: 50px;
    }

    .landing-page h1 {
      font-size: 40px;
    }

    .team {
      width: 13.5vw;
      height: 4vw;
      background-color: #4287f5;
      border: 2px rgba(255, 255, 255, 0.1) solid;
      color: white;
      margin: 2px;
      font-size: 1.5vw;
      border-radius: 2px;
      transition-duration: 0.1s;
      transition: all 0.25s ease-in-out;
    }

    .team:hover {
      background-color: #1a3869;
      cursor: pointer;
    }

    .about {
      width: 13.5vw;
      height: 4vw;
      background-color: transparent;
      border: 1.85px solid white;
      color: white;
      font-size: 1.5vw;
      border-radius: 2px;
      margin: 2px;
      transition: all .25s ease-in-out;
    }

    .about:hover {
      background-color: white;
      color: black;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <nav>
    <span>Vertex</span>
    <div>
      <div class="dropdown">
        <button class="dropbtn"><i class="fas fa-gamepad"></i> Games &#9662;</button>
        <div class="dropdown-content">
          <a href="/games/1v1.lol.html">1v1.LOL</a>
          <a href="/games/bloons-td-1.html">Bloons TD</a>

          <a href="/games/bloons-td-3.html">Bloons TD 3</a>
          <a href="/games/bloons-td-4.html">Bloons TD 4</a>
          <a href="/games/bloons-td-5.html">Bloons TD 5</a>
          <a href="/games/mc-1.8.8.html">Minecraft</a>
        </div>
      </div>
      <div class="dropdown">
        <button class="dropbtn"><i class="fas fa-th"></i> Apps &#9662;</button>
        <div class="dropdown-content">
          <a href="/apps/41.html">AI Chat</a>
          <a href="/apps/cloakify.html">Cloakify</a>
          <a href="/apps/discord.html">Discord</a>
          <a href="/apps/sandbox.html">Sandbox</a>
          <a href="/apps/flash-emulator.html">Flash Emulator</a>
          <a href="/apps/pro__.html">Web Proxy</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="landing-page">
    <h1 style="transform:scale(1.025);">Welcome to Vertex!</h1>
    <p style="transform:scale(1.2);">The best website for studying math!</p>
    <a href="/about.htm"><button class="about">About</button></a>
    <a href="/team.html"><button class="team">Our Team</button></a>
  </div>
  </script>
</body>

</html>
