<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>data stuff</title>
</head>
<body>
    <input id="mean"><button id="mean-btn">Calculate mean</button>
    <input id="med"><button id="med-btn">Calculate median</button>
    <input id="mod"><button id="mod-btn">Calculate mode</button>
    <p>Website made by: Cedar Quattlebaum & Oliver Burdick</p>
    <p>For financial math class!</p>
    <p>View formulas <a href="index.js">here!</a></p>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let button = document.getElementById("mean-btn"); // the btn isnt mean, it calculates mean silly
            button.addEventListener("click", function() {
                let input = document.getElementById('mean');
                let data = input.value.split(' ').map(Number); // convert input to an array
                let meaner = mean(data);

                input.value = meaner;
            });
        });
        document.addEventListener("DOMContentLoaded", function() {
            let button = document.getElementById("med-btn"); // the btn isnt mean, it calculates mean silly
            button.addEventListener("click", function() {
                let input = document.getElementById('med');
                let data = input.value.split(' ').map(Number); // convert input to an array
                let medianaaa = median(data);

                input.value = medianaaa;
            });
        });
        document.addEventListener("DOMContentLoaded", function() {
            let button = document.getElementById("mod-btn"); // the btn isnt mean, it calculates mean silly
            button.addEventListener("click", function() {
                let input = document.getElementById('mod');
                let data = input.value.split(' ').map(Number); // convert input to an array
                let modeeeeeeee = mode(data);

                input.value = modeeeeeeee;
            });
        });
    </script>
    <script>
        function mean(data) {
            let count = data.length; 
            let sum = 0; 
            data.forEach(val => { sum += val; })
            let mean = sum / count;
            return mean;
        }

        function median(data) {
            data.sort((a, b) => a - b);
            let count = data.length;
            if (count % 2 != 0) { return data[Math.floor(count / 2)]; }
            else { let middlenumberuno = data[count / 2 - 1]; let middlenumberdos = data[count / 2]; return (middlenumberuno + middlenumberdos) / 2; }
        }

        function mode(data) {
            let frequencyMap = {}
            data.forEach(val => { frequencyMap[val] = (frequencyMap[val] || 0) + 1; });
            let modes = [];
            let maxFrequency = Math.max(...Object.values(frequencyMap));
            for (let val in frequencyMap) { if (frequencyMap[val] === maxFrequency) { modes.push(Number(val)); } } return modes.length === data.length ? [] : modes; 
        }
    </script>
</body>
</html>
