<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertex</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #060a0f;
      color: #fff;
      z-index: -10;
    }

    nav span {
      color: #fff;
      padding: 10px;
      text-align: left;
      font-size: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    nav {
      background-color: #000103;
      overflow: hidden;
      height: 11vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      border-top: 2px solid;
      border-bottom: 2px solid;
      border-image: linear-gradient(to right, #4287f5, #01061a);
      border-image-slice: 1;
    }

    nav a {
      color: #fff;
      text-align: center;
      padding: 10px;
      text-decoration: none;
      font-size: 16px;
    }

    nav a i {
      margin-right: 5px;
    }

    nav a:hover {
      background-color: #555;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown .dropbtn {
      font-size: 16px;
      border: none;
      outline: none;
      color: #fff;
      padding: 10px;
      background-color: inherit;
      font-family: inherit;
      margin: 0;
    }

    .dropdown-content {
      display: none;
      position: fixed;
      margin-left: 20px;
      right: 10px;
      min-width: 172px;
      z-index: 10000;
      text-align: left;
      background-color: black;
      color: white;
      border-radius: 8px;
      opacity: 0.85;
      border: 1px rgba(255, 255, 255, 0.1) solid;
    }

    .dropdown-content:hover {
      opacity: 1;
      transition-delay: 0.015s;
    }

    .dropdown-content a {
      color: white;
      padding: 10px;
      text-decoration: none;
      display: block;
      font-size: 14px;
    }

    .dropdown-content a:hover {
      background-color: rgba(255, 255, 255, 0.01);
      color: white;
      border-left: white 2px solid;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .landing-page {
      text-align: center;
      margin-top: 50px;
      display: flex;
      align-items: center;
      align-content: center;
      flex-direction: column;
    }

    #team-content {
      text-align: center;
      display: flex;
      align-items: center;
      align-content: center;
      flex-direction: row;
    }

    .landing-page h1 {
      font-size: 36px;
      margin-top: -20px;
    }

    #dev-card {
      background-color: rgba(19, 26, 31, 0.5);
      width: 200px;
      height: 400px;
      display: flex;
      align-items: center;
      align-content: center;
      flex-direction: column;
      padding: 8px;
      border-radius: 8px;
      filter: drop-shadow(5px 8px 10px #000000);
      border: 3px solid rgba(255, 255, 255, 0.017);
      backdrop-filter: blur(20px);
      margin: 8px;
      transition-duration: 0.5s;
    }

    #dev-img {
      margin-top: 8px;
      width: 96px;
      height: 96px;
      border-radius: 100px;
    }

    #dev-card:hover {
      background-color: rgba(19, 26, 31, 1);
      border: 3px solid rgba(255, 255, 255, 0.034);
    }

    .dev-card-a:hover {
      perspective: -100px;
      transform: rotateX(5deg) rotateY(20deg);
    }

    .dev-card-b:hover {
      perspective: -100px;
      transform: scale(.985);
    }

    .dev-card-c:hover {
      perspective: -100px;
      transform: rotateX(-5deg) rotateY(20deg);
    }
  </style>
</head>

<body>
  <nav>
    <span>Vertex</span>
    <div>
      <div class="dropdown">
        <button class="dropbtn"><i class="fas fa-gamepad"></i> Games &#9662;</button>
        <div class="dropdown-content">
          <a href="/games/1v1.lol.html">1v1.LOL</a>
          <a href="/games/bloons-td-1.html">Bloons TD</a>
          <a href="/games/bloons-td-2.html">Bloons TD 2</a>
          <a href="/games/bloons-td-3.html">Bloons TD 3</a>
          <a href="/games/bloons-td-4.html">Bloons TD 4</a>
          <a href="/games/bloons-td-5.html">Bloons TD 5</a>
          <a href="/games/mc-1.8.8.html">Minecraft</a>
        </div>
      </div>
      <div class="dropdown">
        <button class="dropbtn"><i class="fas fa-th"></i> Apps &#9662;</button>
        <div class="dropdown-content">
          <a href="/apps/cloakify.html">Cloakify</a>
          <a href="/apps/sandbox.html">Sandbox</a>
          <a href="/apps/flash-emulator.html">Flash Emulator</a>
          <a href="/apps/pro__.html">Web Proxy</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="landing-page">
    <h1 style="transform:scale(1.025);">Our team:</h1>
    <div id="team-content">
      <div id="dev-card" class="dev-card-a">
        <img id="dev-img"
          src="https://cdn.discordapp.com/avatars/889241254125256714/9c92c84f4a2a44943f09f2139a2f2367.webp?size=100"
          </img>
        <h2>Haxer<br>Role: <i style="text-decoration:italic;font-size:24px;">Owner</i></h2>
      </div>
      <div id="dev-card" class="dev-card-b">
        <img id="dev-img" src="/chris.png" </img>
        <h2 style="font-size:21px;">Chris M. Smith High<h2 style="margin-top:-8px;">Role: <i style="text-decoration:italic;font-size:24px;">Developer</i></h2></h2>
      </div>
      <div id="dev-card" class="dev-card-c">
        <img id="dev-img"
          src="https://cdn.discordapp.com/avatars/872603527531343923/ce1087eef61208e25b6ad90d1b395518.webp" </img>
        <h2>Zenkai Legacy<br>Role: <i style="text-decoration:italic;font-size:24px;">Tester</i></h2>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js"></script>
</body>

</html>
